<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Google Calendar Viewer</title>

	<style>
		* {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
        }

        body {
            padding: 16px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 32px);
        }

        iframe {
            width: 100%;
            flex: 1;
            min-height: 75vh;
            border: none;
            border-radius: 10px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
        }

        .note {
            margin-top: 12px;
            text-align: center;
            font-style: italic;
            color: #666;
            font-size: 0.9rem;
            line-height: 1.4;
            padding: 0 8px;
        }

        .error {
            padding: 24px;
            background: white;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
        }

        code {
            background: #eee;
            padding: 2px 4px;
            border-radius: 4px;
            word-break: break-all;
        }
	</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
	const app = document.getElementById("app");

	const params = new URLSearchParams(location.search);
	const srcParam = params.get("src");

	if (!srcParam) {
		app.innerHTML = `
			<div class="error">
				<h2>No calendar specified.</h2>

				<p>Pass a Google Calendar source in the URL:</p>

				<p><code>?src=your_calendar@group.calendar.google.com</code></p>

				<p>or</p>

				<p><code>?src=https://calendar.google.com/calendar/embed?src=...</code></p>
			</div>
		`;
		throw new Error("Missing src");
	}

	const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

	let calendarURL;

	if (srcParam.startsWith("http")) {
		calendarURL = new URL(srcParam);

		calendarURL.searchParams.set("ctz", timezone);

		if (!calendarURL.pathname.includes("/embed")) {
			calendarURL.pathname = "/calendar/embed";
		}
	}
	else {
		calendarURL = new URL("https://calendar.google.com/calendar/embed");

		calendarURL.searchParams.set("src", srcParam);
		calendarURL.searchParams.set("ctz", timezone);
	}

	calendarURL.searchParams.set("mode", "MONTH");

	const iframe = document.createElement("iframe");
	iframe.src = calendarURL.toString();

	const note = document.createElement("div");
	note.className = "note";
	note.textContent =
		`*Displaying events in the local timezone for ${timezone}`;

	app.appendChild(iframe);
	app.appendChild(note);
</script>

</body>
</html>
